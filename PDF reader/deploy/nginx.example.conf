# Copy to e.g. /etc/nginx/sites-available/pdf-reader and set `root` to your
# absolute path to frontend/dist. Then: sudo nginx -t && sudo systemctl reload nginx
#
# Browser: http://117.254.196.100  (port 80)
# Backend stays on 127.0.0.1:6000 — no need to expose 6000 publicly if you use this.

server {
    listen 80;
    server_name 117.254.196.100;

    root /var/www/pdf-reader/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /upload {
        client_max_body_size 12M;
        proxy_pass http://127.0.0.1:6000/upload;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:6000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
